name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 103.235.75.99
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: AI_API_KEY,GH_TOKEN,GH_WEBHOOK_SECRET,QA_USER_PASSWORD,AI_BASE_URL,AI_MODEL,GH_OWNER,GH_MAIN_REPO,GH_TEST_REPO,PORT,QA_USER_EMAIL,QA_BASE_URL
          script: |
            set -e
            DEPLOY_DIR=~/apps/klikagent
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://github.com/mihaamiharu/klikagent.git "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"
            git pull origin main
            cat > .env <<EOF
            AI_API_KEY=$AI_API_KEY
            GITHUB_TOKEN=$GH_TOKEN
            GITHUB_WEBHOOK_SECRET=$GH_WEBHOOK_SECRET
            QA_USER_PASSWORD=$QA_USER_PASSWORD
            AI_BASE_URL=$AI_BASE_URL
            AI_MODEL=$AI_MODEL
            GITHUB_OWNER=$GH_OWNER
            GITHUB_MAIN_REPO=$GH_MAIN_REPO
            GITHUB_TEST_REPO=$GH_TEST_REPO
            PORT=$PORT
            QA_USER_EMAIL=$QA_USER_EMAIL
            QA_BASE_URL=$QA_BASE_URL
            EOF
            docker compose up --build -d
            docker image prune -f
