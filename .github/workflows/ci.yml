name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_PRIVATE_KEY: ${{ secrets.GH_PRIVATE_KEY }}
          GH_INSTALLATION_ID: ${{ secrets.GH_INSTALLATION_ID }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          GH_OWNER: ${{ vars.GH_OWNER }}
          GH_MAIN_REPO: ${{ vars.GH_MAIN_REPO }}
          QA_ENV_URL: ${{ vars.QA_ENV_URL }}
          PORT: ${{ vars.PORT }}
          MAX_SELF_CORRECTION_ATTEMPTS: ${{ vars.MAX_SELF_CORRECTION_ATTEMPTS }}
          DASHBOARD_PERSIST: ${{ vars.DASHBOARD_PERSIST }}
        with:
          host: 103.235.75.99
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: AI_API_KEY,GH_APP_ID,GH_PRIVATE_KEY,GH_INSTALLATION_ID,QA_ADMIN_EMAIL,QA_ADMIN_PASSWORD,DASHBOARD_PASSWORD,AI_BASE_URL,AI_MODEL,GH_OWNER,GH_MAIN_REPO,QA_ENV_URL,PORT,MAX_SELF_CORRECTION_ATTEMPTS,DASHBOARD_PERSIST
          script: |
            set -e
            DEPLOY_DIR=~/apps/klikagent
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://github.com/mihaamiharu/klikagent.git "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"
            git fetch origin main
            git pull origin main
            export GH_APP_ID=$GH_APP_ID
            export GH_PRIVATE_KEY=$GH_PRIVATE_KEY
            export GH_INSTALLATION_ID=$GH_INSTALLATION_ID
            export GITHUB_OWNER=$GH_OWNER
            export GH_MAIN_REPO=$GH_MAIN_REPO
            export QA_ENV_URL=$QA_ENV_URL
            export QA_ADMIN_EMAIL=$QA_ADMIN_EMAIL
            export QA_ADMIN_PASSWORD=$QA_ADMIN_PASSWORD
            export DASHBOARD_PASSWORD=$DASHBOARD_PASSWORD
            export DASHBOARD_PERSIST=$DASHBOARD_PERSIST
            docker compose up --build -d
            docker image prune -f
