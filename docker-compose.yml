services:
  klikagent:
    build: .
    restart: unless-stopped
    ports:
      - "4000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - AI_API_KEY
      - AI_BASE_URL
      - AI_MODEL
      - GITHUB_TOKEN
      - GITHUB_OWNER
      - GITHUB_TEST_REPO
      - QA_ENV_URL
      - QA_ADMIN_EMAIL
      - QA_ADMIN_PASSWORD
      - DASHBOARD_PASSWORD
      - DASHBOARD_PERSIST
      - PORT
      - MAX_SELF_CORRECTION_ATTEMPTS
