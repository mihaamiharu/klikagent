services:
  klikagent:
    build: .
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
      - AI_API_KEY
      - AI_BASE_URL
      - AI_MODEL
      - GH_APP_ID
      - GH_PRIVATE_KEY
      - GH_INSTALLATION_ID
      - GITHUB_OWNER
      - GH_MAIN_REPO
      - QA_ENV_URL
      - QA_ADMIN_EMAIL
      - QA_ADMIN_PASSWORD
      - DASHBOARD_PASSWORD
      - DASHBOARD_PERSIST
      - PORT
      - MAX_SELF_CORRECTION_ATTEMPTS
    volumes:
      - klikagent-data:/app/data

volumes:
  klikagent-data:
